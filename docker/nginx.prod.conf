# Production config: nginx sits behind a TLS-terminating proxy (Coolify's
# Traefik/Caddy), so it must pass through the proxy's X-Forwarded-* headers
# rather than overwrite them with its own plain-http view of the request.
# The maps fall back to nginx's own values when no upstream proxy is present.

map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

map $http_x_forwarded_for $forwarded_for {
    default $http_x_forwarded_for;
    ""      $remote_addr;
}

upstream web {
    server web:8000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_redirect off;
    }
}
