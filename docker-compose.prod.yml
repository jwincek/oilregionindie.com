# Production stack. Differences from docker-compose.yml (dev):
#   - No source bind mounts, no gunicorn --reload.
#   - Postgres and Redis are not published to the host.
#   - migrate + collectstatic run on web startup, so each deploy refreshes the
#     static volume (a named volume keeps stale files if only built at image time).
#   - nginx publishes no host port: behind Coolify, assign the domain to the
#     nginx service (port 80) and its proxy routes over the Docker network.
#     Running without Coolify? Uncomment the ports block on nginx.
#
# Required environment (via .env — Coolify writes UI-defined variables there):
#   POSTGRES_PASSWORD, and a DATABASE_URL that uses the same password:
#   postgres://oilregion:<password>@db:5432/oilregion
services:
  web:
    build: .
    command:
      - sh
      - -c
      - |
        python manage.py check --deploy &&
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        exec gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8000), timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  worker:
    build: .
    command: python manage.py qcluster
    volumes:
      - media_data:/app/media
    env_file:
      - .env
    depends_on:
      web:
        condition: service_healthy  # web healthy => migrations have completed
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oilregion}
      POSTGRES_USER: ${POSTGRES_USER:-oilregion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oilregion}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    # ports:
    #   - "80:80"
    volumes:
      - ./docker/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_data:
  media_data:
