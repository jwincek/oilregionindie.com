<form hx-post="{% url follow_url_name slug=target.slug %}"
      hx-target="this" hx-swap="outerHTML"
      class="inline">
    {% csrf_token %}
    {% if following %}
    <button type="submit"
            class="text-sm text-ink-500 border border-ink-200 px-3 py-1.5 rounded-md hover:text-red-600 hover:border-red-200 transition group">
        <span class="group-hover:hidden">Following</span>
        <span class="hidden group-hover:inline">Unfollow</span>
    </button>
    {% else %}
    <button type="submit"
            class="text-sm text-white bg-brand-600 px-3 py-1.5 rounded-md hover:bg-brand-700 transition">
        Follow
    </button>
    {% endif %}
</form>
