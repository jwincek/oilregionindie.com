<div id="availability-container">
    {% if availabilities %}
    <div class="space-y-2 mb-4">
        {% for avail in availabilities %}
        <div class="flex items-center justify-between bg-ink-50 rounded-md px-3 py-2 group">
            <div class="flex items-start gap-2 min-w-0">
                <span class="mt-1 w-2 h-2 rounded-full flex-shrink-0 {% if avail.is_active %}bg-green-500{% else %}bg-ink-300{% endif %}"></span>
                <div class="min-w-0">
                    <span class="text-sm font-medium text-ink-700">{{ avail.availability_type.name }}</span>
                    {% if not avail.is_active %}
                    <span class="text-xs text-ink-400 ml-1">(paused)</span>
                    {% endif %}
                    {% if avail.note %}
                    <p class="text-xs text-ink-400 mt-0.5">{{ avail.note }}</p>
                    {% endif %}
                </div>
            </div>
            <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition flex-shrink-0">
                <button hx-get="{% url 'edit_availability' profile_type=profile_type slug=profile.slug pk=avail.pk %}"
                        hx-target="#availability-form-area"
                        hx-swap="innerHTML"
                        class="text-xs text-ink-400 hover:text-brand-600 px-2 py-1 transition">
                    Edit
                </button>
                <button hx-post="{% url 'delete_availability' profile_type=profile_type slug=profile.slug pk=avail.pk %}"
                        hx-target="#availability-container"
                        hx-swap="outerHTML"
                        hx-confirm="Remove this availability flag?"
                        class="text-xs text-ink-400 hover:text-red-600 px-2 py-1 transition">
                    Remove
                </button>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p class="text-sm text-ink-400 mb-4">No availability flags set.</p>
    {% endif %}

    <button hx-get="{% url 'add_availability' profile_type=profile_type slug=profile.slug %}"
            hx-target="#availability-form-area"
            hx-swap="innerHTML"
            class="text-sm text-brand-600 hover:text-brand-700 font-medium transition">
        + Add Availability
    </button>

    <div id="availability-form-area" class="mt-3"></div>
</div>
