{% extends "base.html" %}

{% block title %}Events — {{ SITE_NAME }}{% endblock %}

{% block content %}
<div class="mb-8">
    <h1 class="text-3xl font-display font-bold text-ink-800">Upcoming Events</h1>
    <p class="mt-2 text-ink-500">Concerts, art shows, maker markets, and more.</p>
</div>

<!-- Filters -->
<div class="bg-white rounded-lg shadow-sm p-4 mb-4" x-data="{ filtersOpen: false }">
    <!-- Mobile toggle -->
    <button @click="filtersOpen = !filtersOpen"
            class="md:hidden flex items-center justify-between w-full text-sm font-medium text-ink-700 mb-2">
        <span>Filters</span>
        <svg class="w-4 h-4 transition" :class="{ 'rotate-180': filtersOpen }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
    </button>

    <form hx-get="{% url 'events:listing' %}" hx-target="#event-list" hx-swap="innerHTML" hx-push-url="true"
          class="flex-wrap gap-4 items-end md:flex" :class="filtersOpen ? 'flex' : 'hidden md:flex'">
        <div class="flex-1 min-w-[200px]">
            <label for="q" class="block text-sm font-medium text-ink-600 mb-1">Search</label>
            <input type="text" name="q" id="q" value="{{ query }}"
                   class="w-full rounded-md border-ink-200 shadow-sm focus:border-brand-300 focus:ring-brand-300 text-sm"
                   placeholder="Event name or keyword...">
        </div>
        <div class="min-w-[140px]">
            <label for="type" class="block text-sm font-medium text-ink-600 mb-1">Type</label>
            <select name="type" id="type"
                    hx-get="{% url 'events:listing' %}" hx-target="#event-list" hx-swap="innerHTML"
                    hx-include="closest form" hx-push-url="true"
                    class="w-full rounded-md border-ink-200 shadow-sm focus:border-brand-300 focus:ring-brand-300 text-sm">
                <option value="">All Types</option>
                {% for value, label in event_types %}
                <option value="{{ value }}" {% if current_type == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="min-w-[160px]">
            <label for="venue" class="block text-sm font-medium text-ink-600 mb-1">Venue</label>
            <select name="venue" id="venue"
                    hx-get="{% url 'events:listing' %}" hx-target="#event-list" hx-swap="innerHTML"
                    hx-include="closest form" hx-push-url="true"
                    class="w-full rounded-md border-ink-200 shadow-sm focus:border-brand-300 focus:ring-brand-300 text-sm">
                <option value="">All Venues</option>
                {% for v in venues %}
                <option value="{{ v.slug }}" {% if current_venue == v.slug %}selected{% endif %}>{{ v.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="min-w-[120px]">
            <label for="cost" class="block text-sm font-medium text-ink-600 mb-1">Cost</label>
            <select name="cost" id="cost"
                    hx-get="{% url 'events:listing' %}" hx-target="#event-list" hx-swap="innerHTML"
                    hx-include="closest form" hx-push-url="true"
                    class="w-full rounded-md border-ink-200 shadow-sm focus:border-brand-300 focus:ring-brand-300 text-sm">
                <option value="">Any</option>
                <option value="free" {% if current_cost == "free" %}selected{% endif %}>Free</option>
                <option value="paid" {% if current_cost == "paid" %}selected{% endif %}>Paid</option>
            </select>
        </div>
        <div class="min-w-[140px]">
            <label for="location" class="block text-sm font-medium text-ink-600 mb-1">Location</label>
            <input type="text" name="location" id="location" value="{{ current_location }}"
                   class="w-full rounded-md border-ink-200 shadow-sm focus:border-brand-300 focus:ring-brand-300 text-sm"
                   placeholder="City or state...">
        </div>
        <button type="submit"
                class="bg-ink-800 text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-ink-700 transition">
            Filter
        </button>
    </form>
</div>

<div id="event-list">
    {% include "events/_event_list.html" %}
</div>
{% endblock %}
