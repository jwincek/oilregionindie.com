<div class="bg-white border border-ink-200 rounded-lg p-4 mt-2">
    <form {% if link %}
          hx-post="{% url 'creators:edit_social_link' pk=link.pk %}"
          {% else %}
          hx-post="{% url 'creators:add_social_link' %}"
          {% endif %}
          hx-target="#social-links-container"
          hx-swap="outerHTML"
          class="space-y-3">
        {% csrf_token %}

        <div class="flex flex-wrap gap-3">
            <div class="flex-1 min-w-[140px]">
                <label for="{{ form.platform.id_for_label }}" class="block text-xs font-medium text-ink-600 mb-1">Platform</label>
                {{ form.platform }}
                {% if form.platform.errors %}<p class="text-xs text-red-600 mt-0.5">{{ form.platform.errors.0 }}</p>{% endif %}
            </div>
            <div class="flex-[2] min-w-[200px]">
                <label for="{{ form.url.id_for_label }}" class="block text-xs font-medium text-ink-600 mb-1">URL</label>
                {{ form.url }}
                {% if form.url.errors %}<p class="text-xs text-red-600 mt-0.5">{{ form.url.errors.0 }}</p>{% endif %}
            </div>
            <div class="w-20">
                <label for="{{ form.sort_order.id_for_label }}" class="block text-xs font-medium text-ink-600 mb-1">Order</label>
                {{ form.sort_order }}
            </div>
        </div>

        <div class="flex justify-end gap-2">
            <button type="button"
                    hx-get="{% url 'creators:social_links' %}"
                    hx-target="#social-links-container"
                    hx-swap="outerHTML"
                    class="text-xs text-ink-500 hover:text-ink-700 px-3 py-1.5 transition">
                Cancel
            </button>
            <button type="submit"
                    class="bg-ink-800 text-white text-xs px-4 py-1.5 rounded-md font-medium hover:bg-ink-700 transition">
                {% if link %}Save{% else %}Add{% endif %}
            </button>
        </div>
    </form>
</div>
