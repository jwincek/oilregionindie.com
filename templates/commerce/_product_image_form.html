<div class="bg-white border border-ink-200 rounded-lg p-4 mt-2">
    <form hx-post="{% url 'commerce:add_product_image' pk=product.pk %}"
          hx-target="#product-images-container"
          hx-swap="outerHTML"
          hx-encoding="multipart/form-data"
          class="space-y-3">
        {% csrf_token %}

        <div>
            <label for="{{ form.image.id_for_label }}" class="block text-xs font-medium text-ink-600 mb-1">Image</label>
            {{ form.image }}
        </div>

        <div class="flex flex-wrap gap-3">
            <div class="flex-1 min-w-[180px]">
                <label for="{{ form.alt_text.id_for_label }}" class="block text-xs font-medium text-ink-600 mb-1">Alt Text</label>
                {{ form.alt_text }}
            </div>
            <div class="w-20">
                <label for="{{ form.sort_order.id_for_label }}" class="block text-xs font-medium text-ink-600 mb-1">Order</label>
                {{ form.sort_order }}
            </div>
        </div>

        <div class="flex justify-end gap-2">
            <button type="button"
                    hx-get="{% url 'commerce:product_images' pk=product.pk %}"
                    hx-target="#product-images-container"
                    hx-swap="outerHTML"
                    class="text-xs text-ink-500 hover:text-ink-700 px-3 py-1.5 transition">
                Cancel
            </button>
            <button type="submit"
                    class="bg-ink-800 text-white text-xs px-4 py-1.5 rounded-md font-medium hover:bg-ink-700 transition">
                Upload
            </button>
        </div>
    </form>
</div>
