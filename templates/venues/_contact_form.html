<div class="bg-white border border-ink-200 rounded-lg p-4 mt-2">
    <form {% if contact %}
          hx-post="{% url 'venues:edit_contact' slug=venue.slug pk=contact.pk %}"
          {% else %}
          hx-post="{% url 'venues:add_contact' slug=venue.slug %}"
          {% endif %}
          hx-target="#contacts-container"
          hx-swap="outerHTML"
          class="space-y-3">
        {% csrf_token %}

        <div class="flex flex-wrap gap-3">
            <div class="w-40">
                <label for="{{ form.contact_type.id_for_label }}" class="block text-xs font-medium text-ink-600 mb-1">Type</label>
                {{ form.contact_type }}
            </div>
            <div class="w-32">
                <label for="{{ form.method.id_for_label }}" class="block text-xs font-medium text-ink-600 mb-1">Method</label>
                {{ form.method }}
            </div>
            <div class="flex-1 min-w-[200px]">
                <label for="{{ form.value.id_for_label }}" class="block text-xs font-medium text-ink-600 mb-1">Value</label>
                {{ form.value }}
                {% if form.value.errors %}<p class="text-xs text-red-600 mt-0.5">{{ form.value.errors.0 }}</p>{% endif %}
            </div>
        </div>

        <div class="flex flex-wrap gap-3">
            <div class="flex-1 min-w-[140px]">
                <label for="{{ form.name.id_for_label }}" class="block text-xs font-medium text-ink-600 mb-1">Contact Person</label>
                {{ form.name }}
            </div>
            <div class="flex-1 min-w-[200px]">
                <label for="{{ form.notes.id_for_label }}" class="block text-xs font-medium text-ink-600 mb-1">Notes</label>
                {{ form.notes }}
            </div>
            <div class="w-20">
                <label for="{{ form.sort_order.id_for_label }}" class="block text-xs font-medium text-ink-600 mb-1">Order</label>
                {{ form.sort_order }}
            </div>
        </div>

        <div>
            <label class="flex items-center gap-2 text-sm text-ink-700">
                {{ form.is_public }}
                Show on public page
            </label>
        </div>

        <div class="flex justify-end gap-2">
            <button type="button"
                    hx-get="{% url 'venues:contacts' slug=venue.slug %}"
                    hx-target="#contacts-container"
                    hx-swap="outerHTML"
                    class="text-xs text-ink-500 hover:text-ink-700 px-3 py-1.5 transition">
                Cancel
            </button>
            <button type="submit"
                    class="bg-ink-800 text-white text-xs px-4 py-1.5 rounded-md font-medium hover:bg-ink-700 transition">
                {% if contact %}Save{% else %}Add{% endif %}
            </button>
        </div>
    </form>
</div>
