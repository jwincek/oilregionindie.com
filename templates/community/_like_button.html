<form hx-post="{% url 'toggle_like' pk=post.pk %}"
      hx-target="this" hx-swap="outerHTML"
      class="inline">
    {% csrf_token %}
    <button type="submit"
            class="flex items-center gap-1 text-sm transition
                   {% if liked %}text-brand-600{% else %}text-ink-400 hover:text-brand-600{% endif %}">
        <svg class="w-4 h-4" fill="{% if liked %}currentColor{% else %}none{% endif %}" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
        </svg>
        {{ post.liked_by.count }}
    </button>
</form>
