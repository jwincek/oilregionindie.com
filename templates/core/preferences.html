{% extends "base.html" %}

{% block title %}Preferences — {{ SITE_NAME }}{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-display font-bold text-ink-800 mb-8">Preferences</h1>

    {% if messages %}
    {% for message in messages %}
    <div class="mb-4 p-4 rounded-md text-sm {% if message.tags == 'success' %}bg-green-50 text-green-800 border border-green-200{% else %}bg-blue-50 text-blue-800 border border-blue-200{% endif %}">
        {{ message }}
    </div>
    {% endfor %}
    {% endif %}

    <form method="post" class="bg-white rounded-lg shadow-sm p-6 space-y-6">
        {% csrf_token %}

        <div>
            <h2 class="font-semibold text-ink-800 mb-3">Email Notifications</h2>
            <label class="flex items-start gap-3">
                <input type="checkbox" name="email_digest" value="1"
                       {% if profile.email_digest %}checked{% endif %}
                       class="mt-1 rounded border-ink-300 text-brand-600 focus:ring-brand-500">
                <div>
                    <p class="text-sm font-medium text-ink-700">Weekly digest</p>
                    <p class="text-xs text-ink-500 mt-0.5">
                        Receive a weekly summary of new events, posts, and updates from creators and venues you follow.
                    </p>
                </div>
            </label>
        </div>

        <div class="flex justify-end pt-4 border-t border-ink-100">
            <button type="submit"
                    class="bg-ink-800 text-white px-6 py-2 rounded-md text-sm font-medium hover:bg-ink-700 transition">
                Save Preferences
            </button>
        </div>
    </form>
</div>
{% endblock %}
