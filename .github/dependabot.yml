version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    # One collective PR for minor/patch bumps keeps the noise down; majors
    # (Django 6, Wagtail 8, ...) arrive individually for deliberate review.
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
