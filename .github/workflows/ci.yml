name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test suite (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oilregion
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DJANGO_SECRET_KEY: ci-only-secret-key-not-used-anywhere-real
      # Matches how the suite runs locally (dev .env has DJANGO_DEBUG=True;
      # Django's test runner still forces DEBUG=False at runtime). Keeping
      # settings-load parity avoids ManifestStaticFilesStorage consulting a
      # manifest that only exists after collectstatic.
      DJANGO_DEBUG: "True"
      # Unlike local runs (SQLite), CI exercises the database production uses.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/oilregion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python manage.py test

  docker-build:
    name: Production image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # A clean build from requirements.txt alone is the regression test for
      # "works in the venv, breaks in the image" failures (missing deps,
      # .dockerignore mistakes, base-image drift).
      - run: docker build -t oilregion-hub:ci .

  # Deploy chain (enable when the Coolify instance exists):
